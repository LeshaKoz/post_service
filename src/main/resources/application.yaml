spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/post-service
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

server:
  port: 8081
  servlet:
    context-path: /posts/api

logging:
  level:
    root: info

post:
  moderation:
    batch-size: 10
    page-size: 20
    cronPeriod: "0 0 0 * * *"
  grammar:
    cronPeriod: "0 0 0 * * *"
    batch-size: 20
    page-size: 20

thread:
  pool:
    size: 10

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080
