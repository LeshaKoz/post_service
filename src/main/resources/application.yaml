spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 170MB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
    filter: true
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: multipart/form-data
  default-produces-media-type: application/json

server:
  port: 8081
  address: 0.0.0.0

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

amazonS3:
  endpoint: http://127.0.0.1:9000
  access-key: user
  secret-key: password
  bucket-name: corpbucket
  region: ap-southeast-2

file-upload:
  post:
    minimum-amount: 1
    maximum-amount: 10
    info-by-file-type:
      image:
        max-size: 5242880
        allowed-extensions:
          - jpg
          - jpeg
          - png
      video:
        max-size: 157286400
        allowed-extensions:
          - mp4
          - mkv
          - avi
          - mov
          - quicktime
      audio:
        max-size: 10485760
        allowed-extensions:
          - mp3
          - wav
          - ogg
          - mpeg
      another:
        max-size: 0
        allowed-extensions: [ ]
    image-size-limits:
      square:
        max-length: 1080
      rectangular:
        max-long-side-length: 1080
        max-short-side-length: 566

task-executor:
  file-upload:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 50

ad:
  expired:
    cron-expired-post-ad-deletion: "0 0 1 * *"
  deletion:
    batchsize: 100