spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

server:
  port: 8081

logging:
  level:
    root: info

services:
  user-service:
    host: localhost
    port: 8080
  project-service:
    host: localhost
    port: 8082
  payment-service:
    host: localhost
    port: 9080
  comment-analyzer:
    endpoint: https://commentanalyzer.googleapis.com/v1alpha1
    api-key: "AIzaSyDNS2DzSDuUQI_FLdY4dSmA5Bgj397kwK8"

comments:
  moderation:
    cron: "0/10 * * * * *"
    batch-size: 100000
    thread-pool-size: 24
    backoff-delay: 1000
